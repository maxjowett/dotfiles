# Set the prefix key to Ctrl+a (instead of the default Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support for scrolling and pane resizing
set -g mouse on

# Set the history limit for scrollback
set -g history-limit 10000

# Set vi-style keybindings for copy mode
set-window-option -g mode-keys vi

# Bind 'r' to reload the tmux configuration file
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Improve pane navigation with more ergonomic keybindings (e.g., Ctrl+a h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Clear existing bindings for split-window
unbind '"'
unbind %

# Map split window to more intuitive keys
bind "\\" split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
